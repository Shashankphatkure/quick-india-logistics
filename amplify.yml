version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev
    build:
      commands:
        # Amplify console env vars are only available at build time, not runtime.
        # Write them to .env.production so Next.js bakes them into the SSR bundle.
        - env | grep -E '^(DATABASE_URL|S3_BUCKET|S3_REGION|S3_ACCESS_KEY_ID|S3_SECRET_ACCESS_KEY|NODE_ENV|GITHUB_TOKEN|GITHUB_REPO_OWNER|GITHUB_REPO_NAME)=' >> .env.production || true
        - echo "Baked env keys:" && cut -d= -f1 .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
